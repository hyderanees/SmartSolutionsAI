<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topF" x1="9" y1="7" x2="55" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="leftF" x1="9" y1="20" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="rightF" x1="32" y1="20" x2="55" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <radialGradient id="gapGlow" cx="32" cy="34" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0e1a"/>

  <!-- Gap glow core -->
  <circle cx="32" cy="34" r="14" fill="url(#gapGlow)"/>

  <!-- Top face -->
  <g transform="translate(0,-2.4)">
    <path d="M32,7 L55,20 L32,32 L9,20Z" fill="url(#topF)"/>
    <path d="M32,7 L55,20 L32,32 L9,20Z" stroke="rgba(255,255,255,0.12)" stroke-width="0.6" fill="none" stroke-linejoin="round"/>
    <circle cx="28" cy="19" r="1.6" fill="rgba(255,255,255,0.3)"/>
    <line x1="28" y1="19" x2="37" y2="23" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>
    <circle cx="37" cy="23" r="1.1" fill="rgba(255,255,255,0.2)"/>
    <line x1="37" y1="23" x2="32" y2="17" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  </g>

  <!-- Left face -->
  <g transform="translate(-2.2,1.6)">
    <path d="M9,20 L32,32 L32,58 L9,44Z" fill="url(#leftF)"/>
    <path d="M9,20 L32,32 L32,58 L9,44Z" stroke="rgba(255,255,255,0.06)" stroke-width="0.6" fill="none" stroke-linejoin="round"/>
    <circle cx="19" cy="36" r="1.3" fill="rgba(255,255,255,0.2)"/>
    <line x1="19" y1="36" x2="19" y2="44" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>
    <circle cx="19" cy="44" r="0.9" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- Right face -->
  <g transform="translate(2.2,1.6)">
    <path d="M32,32 L55,20 L55,44 L32,58Z" fill="url(#rightF)"/>
    <path d="M32,32 L55,20 L55,44 L32,58Z" stroke="rgba(255,255,255,0.04)" stroke-width="0.6" fill="none" stroke-linejoin="round"/>
    <circle cx="45" cy="36" r="1.3" fill="rgba(255,255,255,0.12)"/>
    <line x1="45" y1="36" x2="39" y2="45" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
    <circle cx="39" cy="45" r="0.9" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- Center vertex bloom -->
  <circle cx="32" cy="33.5" r="4" fill="#fff" opacity="0.1" filter="url(#bloom)"/>
  <circle cx="32" cy="33.5" r="2" fill="#fff" opacity="0.45"/>
  <circle cx="32" cy="33.5" r="1" fill="#fff" opacity="0.9"/>
</svg>
