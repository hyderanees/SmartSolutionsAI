<svg viewBox="0 0 320 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topF" x1="9" y1="5" x2="51" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="leftF" x1="9" y1="18" x2="30" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="rightF" x1="30" y1="18" x2="51" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <radialGradient id="gGlow" cx="30" cy="32" r="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tGrad" x1="72" y1="14" x2="300" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ─── ICON MARK ─── -->

  <!-- Gap glow -->
  <circle cx="30" cy="32" r="12" fill="url(#gGlow)"/>

  <!-- Top face -->
  <g transform="translate(0,-2)">
    <path d="M30,5 L51,18 L30,30 L9,18Z" fill="url(#topF)"/>
    <path d="M30,5 L51,18 L30,30 L9,18Z" stroke="rgba(255,255,255,0.12)" stroke-width="0.5" fill="none" stroke-linejoin="round"/>
    <circle cx="26" cy="17" r="1.3" fill="rgba(255,255,255,0.3)"/>
    <line x1="26" y1="17" x2="34" y2="21" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
    <circle cx="34" cy="21" r="0.9" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- Left face -->
  <g transform="translate(-1.8,1.3)">
    <path d="M9,18 L30,30 L30,56 L9,42Z" fill="url(#leftF)"/>
    <path d="M9,18 L30,30 L30,56 L9,42Z" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" fill="none" stroke-linejoin="round"/>
    <circle cx="18" cy="34" r="1.1" fill="rgba(255,255,255,0.2)"/>
    <line x1="18" y1="34" x2="18" y2="41" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  </g>

  <!-- Right face -->
  <g transform="translate(1.8,1.3)">
    <path d="M30,30 L51,18 L51,42 L30,56Z" fill="url(#rightF)"/>
    <path d="M30,30 L51,18 L51,42 L30,56Z" stroke="rgba(255,255,255,0.04)" stroke-width="0.5" fill="none" stroke-linejoin="round"/>
    <circle cx="42" cy="34" r="1.1" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- Center vertex bloom -->
  <circle cx="30" cy="31" r="3" fill="#fff" opacity="0.1" filter="url(#bloom)"/>
  <circle cx="30" cy="31" r="1.5" fill="#fff" opacity="0.45"/>
  <circle cx="30" cy="31" r="0.7" fill="#fff" opacity="0.9"/>

  <!-- ─── TEXT ─── -->

  <text x="72" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="800" fill="url(#tGrad)" letter-spacing="-0.5">
    Smart Solutions AI
  </text>
</svg>
